[global/wm]
include-file = ~/.config/polybar/colors.ini
include-file = ~/.config/polybar/modules.ini


[section/base]
width = 100%
height = 24pt
radius = 6
fixed-center = true
; dpi = 96

background = ${colors.background}
foreground = ${colors.foreground}

line-size = 4pt

border-size = 4pt
border-color = #00000000

padding-left = 0
padding-right = 1

module-margin = 1

separator = |
separator-foreground = ${colors.disabled}

font-0 = "Hack Nerd Font Mono:style=Regular;2"
; font-0 = "Hack Nerd Font Mono:style=Regular"


cursor-click = pointer
cursor-scroll = ns-resize

enable-ipc = true

; tray-position = right

; wm-restack = generic
; wm-restack = bspwm
; wm-restack = i3

; override-redirect = true

[bar/main]
inherit = section/base
monitor = Virtual1

modules-left = i3 xwindow
modules-right = filesystem pulseaudio memory cpu date

[bar/secondary]
inherit = section/base
monitor = Virtual2

modules-left = i3 xwindow
modules-right = date

height = 16pt
radius = 3
line-size = 2pt
font-0 = "Hack Nerd Font Mono:style=Regular:size=8;2"

[settings]
screenchange-reload = true
pseudo-transparency = true

; vim:ft=dosini
